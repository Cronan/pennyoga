name: Link check

on:
  schedule:
    # Every Monday at 06:00 UTC.
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee link checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 4
            --accept 200,206,403,429
            --exclude-mail
            --exclude '^mailto:'
            --exclude '^tel:'
            --exclude 'pennyoga\.co\.uk/(classes|yoga-for-over-60s|yoga-for-stiff-backs)'
            './**/*.html'
          fail: false

      - name: Open or update issue if links broken
        if: env.lychee_exit_code != '0'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: Broken links found by lychee
          content-filepath: ./lychee/out.md
          labels: link-check, automated
